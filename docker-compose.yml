version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: homeapp-postgres
    environment:
      POSTGRES_DB: homeapp
      POSTGRES_USER: homeapp
      POSTGRES_PASSWORD: homeapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

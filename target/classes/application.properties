spring.application.name=HomeAPP

# Default DB (local dev fallback): persistent H2
spring.datasource.url=jdbc:h2:file:./data/homeappdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Yandex Maps
yandex.maps.api-key=b6026488-4247-4938-909d-2b80a7996e62
yandex.maps.js-api-url=https://api-maps.yandex.ru/2.1/?apikey=${yandex.maps.api-key}&lang=ru_RU
yandex.maps.search-api-url=https://search-maps.yandex.ru/v1/
yandex.maps.search-limit=20

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server
server.port=8080

# Upload limits (for review/place images from mobile devices)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# Optional admin seed (uses BCrypt hash, no plaintext password in code)
# Example:
# app.admin.seed.email=admin@example.com
# app.admin.seed.name=Администратор
# app.admin.seed.password-hash=$2a$10$.....................................................
app.admin.seed.email=
app.admin.seed.name=?????????????
app.admin.seed.password-hash=

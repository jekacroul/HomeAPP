<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить место - Где работать</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
    <div class="container nav-content">
        <a href="/" class="logo">📍 Где работать</a>
        <div class="nav-links">
            <a href="/" class="btn btn-outline">Назад</a>
        </div>
    </div>
</nav>

<main class="container page-content">
    <div class="form-container">
        <h1>Добавить новое место</h1>
        <form th:action="@{/add-place}" method="post" th:object="${place}" enctype="multipart/form-data">
            <div class="form-group">
                <label for="geo-search">Поиск заведений в Минске</label>
                <div class="search-row">
                    <input type="text" id="geo-search" placeholder="Например: кофейня, коворкинг, кафе">
                    <button type="button" id="geo-search-btn" class="btn btn-secondary">Найти</button>
                </div>
                <div id="geo-results" class="geo-results"></div>
            </div>

            <div class="form-group">
                <label>Место на карте *</label>
                <div id="place-map" class="place-map"></div>
                <small class="hint">Выберите место из поиска или кликните по карте.</small>
            </div>

            <div class="form-group">
                <label for="name">Название *</label>
                <input type="text" id="name" name="name" required placeholder="Например: Coffee & Work">
            </div>

            <div class="form-group">
                <label for="address">Адрес *</label>
                <input type="text" id="address" name="address" required placeholder="ул. Ленина, 10">
            </div>

            <input type="hidden" id="latitude" name="latitude" required>
            <input type="hidden" id="longitude" name="longitude" required>

            <div class="form-group">
                <label for="imageUrl">URL изображения</label>
                <input type="url" id="imageUrl" name="imageUrl" placeholder="https://...">
            </div>

            <div class="form-group">
                <label for="imageFile">или загрузите изображение с устройства</label>
                <input type="file" id="imageFile" name="imageFile" accept="image/*">
            </div>

            <div class="form-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="wifi" name="wifi">
                    <span>Есть Wi-Fi</span>
                </label>
            </div>

            <div class="form-group" id="wifi-speed-group" style="display:none;">
                <label for="wifiSpeed">Скорость Wi-Fi (Mbps)</label>
                <input type="number" id="wifiSpeed" name="wifiSpeed" placeholder="50">
            </div>

            <div class="form-group">
                <label for="noiseLevel">Уровень шума</label>
                <select id="noiseLevel" name="noiseLevel">
                    <option value="QUIET">Тихо</option>
                    <option value="MEDIUM" selected>Средне</option>
                    <option value="NOISY">Шумно</option>
                </select>
            </div>

            <div class="form-group">
                <label for="sockets">Розетки</label>
                <select id="sockets" name="sockets">
                    <option value="MANY">Много</option>
                    <option value="FEW" selected>Мало</option>
                    <option value="NONE">Нет</option>
                </select>
            </div>

            <div class="form-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="stayDurationAllowed" name="stayDurationAllowed">
                    <span>Можно сидеть долго</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-large">Добавить место</button>
        </form>
    </div>
</main>

<script th:src="${mapApiUrl}" type="text/javascript"></script>
<script th:inline="javascript">
    const minskCenter = [53.9023, 27.5615];

    let map;
    let marker;
    let searchMarkers = [];

    const latitudeInput = document.getElementById('latitude');
    const longitudeInput = document.getElementById('longitude');
    const searchInput = document.getElementById('geo-search');
    const searchButton = document.getElementById('geo-search-btn');
    const resultsBox = document.getElementById('geo-results');

    function setMarker(lat, lon) {
        latitudeInput.value = lat;
        longitudeInput.value = lon;

        if (!marker) {
            marker = new ymaps.Placemark([lat, lon], {}, {preset: 'islands#redDotIcon'});
            map.geoObjects.add(marker);
        } else {
            marker.geometry.setCoordinates([lat, lon]);
        }

        map.panTo([lat, lon], {duration: 200});
    }

    function clearSearchMarkers() {
        searchMarkers.forEach((item) => map.geoObjects.remove(item));
        searchMarkers = [];
    }

    function getCurrentBbox() {
        const bounds = map.getBounds();
        if (!bounds || bounds.length !== 2) {
            return '';
        }

        const [first, second] = bounds;
        const south = Math.min(first[0], second[0]);
        const north = Math.max(first[0], second[0]);
        const west = Math.min(first[1], second[1]);
        const east = Math.max(first[1], second[1]);

        return `${west},${north},${east},${south}`;
    }

    async function searchPlaces() {
        const query = searchInput.value.trim();
        if (!query) {
            resultsBox.innerHTML = '<div class="result-item muted">Введите запрос для поиска.</div>';
            return;
        }

        resultsBox.innerHTML = '<div class="result-item muted">Ищем...</div>';

        try {
            const bbox = getCurrentBbox();
            const response = await fetch(`/api/minsk-places?query=${encodeURIComponent(query)}&bbox=${encodeURIComponent(bbox)}`);
            if (!response.ok) {
                throw new Error('API request failed');
            }

            const places = await response.json();
            clearSearchMarkers();

            if (!places.length) {
                resultsBox.innerHTML = '<div class="result-item muted">Ничего не найдено. Попробуйте другой запрос.</div>';
                return;
            }

            resultsBox.innerHTML = '';
            const allCoordinates = [];

            places.forEach((place) => {
                const item = document.createElement('button');
                item.type = 'button';
                item.className = 'result-item';
                item.textContent = `${place.name} — ${place.address}`;

                const point = new ymaps.Placemark(
                    [place.latitude, place.longitude],
                    {balloonContent: `${place.name}<br>${place.address}`},
                    {preset: 'islands#blueDotIcon'}
                );
                map.geoObjects.add(point);
                searchMarkers.push(point);
                allCoordinates.push([place.latitude, place.longitude]);

                item.addEventListener('click', () => {
                    document.getElementById('name').value = place.name;
                    document.getElementById('address').value = place.address;
                    setMarker(place.latitude, place.longitude);
                    point.balloon.open();
                });

                resultsBox.appendChild(item);
            });

            if (allCoordinates.length > 1) {
                map.setBounds(ymaps.util.bounds.fromPoints(allCoordinates), {checkZoomRange: true, duration: 200});
            } else if (allCoordinates.length === 1) {
                map.setCenter(allCoordinates[0], 15, {duration: 200});
            }
        } catch (e) {
            resultsBox.innerHTML = '<div class="result-item muted">Не удалось получить данные из API.</div>';
        }
    }

    ymaps.ready(() => {
        map = new ymaps.Map('place-map', {
            center: minskCenter,
            zoom: 12,
            controls: ['zoomControl', 'fullscreenControl']
        });

        map.events.add('click', (e) => {
            const coords = e.get('coords');
            setMarker(coords[0], coords[1]);
        });

        searchButton.addEventListener('click', searchPlaces);
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                searchPlaces();
            }
        });
    });

    document.getElementById('wifi').addEventListener('change', function() {
        document.getElementById('wifi-speed-group').style.display = this.checked ? 'block' : 'none';
    });

    document.querySelector('form').addEventListener('submit', function(e) {
        if (!latitudeInput.value || !longitudeInput.value) {
            e.preventDefault();
            alert('Выберите место на карте или через поиск.');
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Где работать</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page bg-slate-950 text-slate-100 min-h-screen flex flex-col">
    <div class="auth-container">
        <div class="auth-card">
            <a th:href="@{/}" class="logo text-indigo-600 font-bold text-xl">📍 Где работать</a>
            <h1>Вход</h1>
            
            <div th:if="${param.error}" class="alert alert-error">
                Неверный email или пароль
            </div>
            <div th:if="${param.banned}" class="alert alert-error">
                Ваш аккаунт заблокирован администратором
            </div>
            <div th:if="${param.registered}" class="alert alert-success">
                Регистрация успешна. Теперь войдите в систему.
            </div>
            
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Email</label>
                    <input type="email" id="username" name="username" required placeholder="your@email.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-primary btn-large inline-flex w-full items-center justify-center rounded-lg bg-indigo-600 px-4 py-3 font-semibold text-white hover:bg-indigo-500 transition">Войти</button>
            </form>
            
            <p class="auth-footer">
                Нет аккаунта? <a th:href="@{/register}">Зарегистрироваться</a>
            </p>
        </div>
    </div>
    <footer class="footer home-footer mt-auto border-t border-slate-800 bg-slate-950/90">
        <div class="container home-footer-content max-w-7xl mx-auto px-4 py-6 text-slate-300 flex flex-col md:flex-row items-center justify-between gap-3">
            <p>© 2026 Где работать. Все права защищены.</p>
            <div class="home-footer-links">
                <a href="#">О проекте</a>
                <a href="#">Контакты</a>
            </div>
        </div>
    </footer>
<script defer th:src="@{/js/feedback-widget.js}"></script>
</body>
</html>

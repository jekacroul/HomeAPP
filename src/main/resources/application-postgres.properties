# PostgreSQL profile (activate with SPRING_PROFILES_ACTIVE=postgres)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/homeapp}
spring.datasource.username=${DB_USERNAME:homeapp}
spring.datasource.password=${DB_PASSWORD:homeapp}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Upload limits (for review/place images from mobile devices)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# Yandex Maps (duplicated to avoid missing placeholders under profile-only deployments)
yandex.maps.api-key=b6026488-4247-4938-909d-2b80a7996e62
yandex.maps.js-api-url=https://api-maps.yandex.ru/2.1/?apikey=${yandex.maps.api-key}&lang=ru_RU
# Geoapify search workaround
geoapify.api-key=7aa2f88d19d7416988f9da9e123b5729
geoapify.places-url=https://api.geoapify.com/v2/places?categories=catering.cafe,catering.restaurant,catering.fast_food,catering.bar&filter=rect:27.438915081299548,53.890216642813314,27.520990677155474,53.84386961984724&limit=50&apiKey=${geoapify.api-key}
geoapify.search-limit=50

# Logging
logging.config=classpath:logback-spring.xml
logging.level.root=INFO
logging.level.com.example.demo=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.com.zaxxer.hikari=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# PostgreSQL profile (activate with SPRING_PROFILES_ACTIVE=postgres)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/homeapp}
spring.datasource.username=${DB_USERNAME:homeapp}
spring.datasource.password=${DB_PASSWORD:homeapp}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Geoapify (duplicated to avoid missing placeholders under profile-only deployments)
geoapify.api-key=7aa2f88d19d7416988f9da9e123b5729
geoapify.map-tile-url=https://maps.geoapify.com/v1/tile/carto/{z}/{x}/{y}.png?&apiKey=${geoapify.api-key}
geoapify.places-url=https://api.geoapify.com/v2/places?categories=catering.cafe,catering.restaurant,catering.fast_food,catering.bar&filter=rect:27.438915081299548,53.890216642813314,27.520990677155474,53.84386961984724&limit=20&apiKey=${geoapify.api-key}
geoapify.search-limit=100

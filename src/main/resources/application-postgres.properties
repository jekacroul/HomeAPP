# PostgreSQL profile (activate with SPRING_PROFILES_ACTIVE=postgres)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/homeapp}
spring.datasource.username=${DB_USERNAME:homeapp}
spring.datasource.password=${DB_PASSWORD:homeapp}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Upload limits (for review/place images from mobile devices)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# Yandex Maps (duplicated to avoid missing placeholders under profile-only deployments)
yandex.maps.api-key=b6026488-4247-4938-909d-2b80a7996e62
yandex.maps.js-api-url=https://api-maps.yandex.ru/2.1/?apikey=${yandex.maps.api-key}&lang=ru_RU
yandex.maps.search-api-url=https://search-maps.yandex.ru/v1/
yandex.maps.search-limit=20

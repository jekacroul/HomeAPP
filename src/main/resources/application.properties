spring.application.name=HomeAPP

# Default to PostgreSQL settings (application-postgres.properties)
# to avoid accidental embedded H2 startup in production/war deployments.
spring.profiles.default=postgres

# Datasource properties are injected at bootstrap in HomeApplication
# from environment variables (DB_URL / DATABASE_URL / SPRING_DATASOURCE_URL).

# Yandex Maps
yandex.maps.api-key=b6026488-4247-4938-909d-2b80a7996e62
yandex.maps.js-api-url=https://api-maps.yandex.ru/2.1/?apikey=${yandex.maps.api-key}&lang=ru_RU
# Geoapify search workaround
geoapify.api-key=7aa2f88d19d7416988f9da9e123b5729
geoapify.places-url=https://api.geoapify.com/v2/places?categories=catering.cafe,catering.restaurant,catering.fast_food,catering.bar&filter=rect:27.438915081299548,53.890216642813314,27.520990677155474,53.84386961984724&limit=50&apiKey=${geoapify.api-key}
geoapify.search-limit=50

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server
server.port=8080

# Upload limits (for review/place images from mobile devices)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# Optional admin seed (uses BCrypt hash, no plaintext password in code)
# Example:
# app.admin.seed.email=admin@example.com
# app.admin.seed.name=Администратор
# app.admin.seed.password-hash=$2a$10$.....................................................
app.admin.seed.email=
app.admin.seed.name=?????????????
app.admin.seed.password-hash=

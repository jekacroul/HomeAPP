spring.application.name=HomeAPP

# Default DB: PostgreSQL (to avoid silent fallback to empty local H2 under Tomcat).
# Override via env vars or JVM -D properties:
# DB_URL / SPRING_DATASOURCE_URL
# DB_DRIVER / SPRING_DATASOURCE_DRIVER_CLASS_NAME
# DB_USERNAME / SPRING_DATASOURCE_USERNAME
# DB_PASSWORD / SPRING_DATASOURCE_PASSWORD
# DB_DIALECT / SPRING_JPA_DATABASE_PLATFORM
spring.datasource.url=${DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/homeapp}}
spring.datasource.driverClassName=${DB_DRIVER:${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:homeapp}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:homeapp}}
spring.jpa.database-platform=${DB_DIALECT:${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}}
spring.h2.console.enabled=false

# Geoapify
geoapify.api-key=7aa2f88d19d7416988f9da9e123b5729
geoapify.map-tile-url=https://maps.geoapify.com/v1/tile/carto/{z}/{x}/{y}.png?&apiKey=${geoapify.api-key}
geoapify.places-url=https://api.geoapify.com/v2/places?categories=catering.cafe,catering.restaurant,catering.fast_food,catering.bar&filter=rect:27.438915081299548,53.890216642813314,27.520990677155474,53.84386961984724&limit=20&apiKey=${geoapify.api-key}
geoapify.search-limit=100

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server
server.port=8080

# Upload limits (for review/place images from mobile devices)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# Optional admin seed (uses BCrypt hash, no plaintext password in code)
# Example:
# app.admin.seed.email=admin@example.com
# app.admin.seed.name=Администратор
# app.admin.seed.password-hash=$2a$10$.....................................................
app.admin.seed.email=
app.admin.seed.name=?????????????
app.admin.seed.password-hash=

# One-time migration switch for legacy records with plaintext passwords.
# Enable only for first startup if old users were saved without BCrypt hash.
app.auth.migrate-plain-passwords=false

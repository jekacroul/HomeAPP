spring.application.name=HomeAPP

# Default DB (local dev fallback): persistent H2
spring.datasource.url=jdbc:h2:file:./data/homeappdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Geoapify
geoapify.api-key=7aa2f88d19d7416988f9da9e123b5729
geoapify.map-tile-url=https://maps.geoapify.com/v1/tile/carto/{z}/{x}/{y}.png?&apiKey=${geoapify.api-key}
geoapify.places-url=https://api.geoapify.com/v2/places?categories=catering.cafe,catering.restaurant,catering.fast_food,catering.bar&filter=rect:27.438915081299548,53.890216642813314,27.520990677155474,53.84386961984724&limit=20&apiKey=${geoapify.api-key}
geoapify.search-limit=100

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server
server.port=8080

# Optional admin seed (uses BCrypt hash, no plaintext password in code)
# Example:
# app.admin.seed.email=admin@example.com
# app.admin.seed.name=Администратор
# app.admin.seed.password-hash=$2a$10$.....................................................
app.admin.seed.email=
app.admin.seed.name=?????????????
app.admin.seed.password-hash=

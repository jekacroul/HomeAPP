spring.application.name=HomeAPP

# Default DB (local dev fallback): persistent H2
spring.datasource.url=../application.properties/${spring.datasource.url}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=../application.properties/${spring.datasource.username}
spring.datasource.password=../application.properties/${spring.datasource.password}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Yandex Maps
yandex.maps.api-key=../application.properties/${yandex.maps.api-key}
yandex.maps.js-api-url=../application.properties/${yandex.maps.js-api-url}
# Search settings for local place lookup
places.search-limit=../application.properties/${places.search-limit}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server
server.port=8080

# Upload limits (for review/place images from mobile devices)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB

# Logging
logging.config=classpath:logback-spring.xml
logging.level.root=INFO
logging.level.com.example.demo=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.com.zaxxer.hikari=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG

# Feedback -> Tasks service endpoint
# Example: feedback.telegram.bot-url=http://localhost:8080/
feedback.telegram.bot-url=../application.properties/${feedback.telegram.bot-url}
# Chat for forwarding feedback into task queue
# Example: feedback.telegram.chat-id=1
feedback.telegram.chat-id=../application.properties/${feedback.telegram.chat-id}

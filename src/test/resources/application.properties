# Test DB (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Required app placeholders for Spring context in tests
geoapify.api-key=test-key
geoapify.map-tile-url=https://maps.example.test/{z}/{x}/{y}.png?apiKey=${geoapify.api-key}
geoapify.places-url=https://api.example.test/places
geoapify.search-limit=100

# Upload limits for multipart tests
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB
